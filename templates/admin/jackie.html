{% extends "base_admin.html" %}

{% block page_title %}Jackie AI{% endblock %}
{% block page_subtitle %}{% endblock %}

{% block content %}
<style>
    /* -- Orb ------------------------------------------------------------ */
    .jackie-orb {
        width: 120px; height: 120px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #e4c76a, #c8a960, #8b6914);
        box-shadow: 0 0 60px rgba(200, 169, 96, 0.4), 0 0 120px rgba(200, 169, 96, 0.2);
        animation: orbPulse 3s ease-in-out infinite;
        margin: 0 auto;
        cursor: pointer;
    }
    .jackie-orb.loading {
        animation: orbPulseFast 1s ease-in-out infinite;
    }
    .jackie-orb.voice-listening {
        box-shadow: 0 0 60px rgba(80, 200, 120, 0.45), 0 0 120px rgba(80, 200, 120, 0.25);
        animation: orbPulse 2s ease-in-out infinite;
    }
    .jackie-orb.voice-speaking {
        animation: orbPulseFast 0.7s ease-in-out infinite;
        box-shadow: 0 0 80px rgba(200, 169, 96, 0.7), 0 0 160px rgba(200, 169, 96, 0.4);
    }
    .jackie-orb.voice-muted {
        box-shadow: 0 0 40px rgba(220, 70, 70, 0.4), 0 0 80px rgba(220, 70, 70, 0.2);
        animation: none;
        opacity: 0.7;
    }
    @keyframes orbPulse {
        0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(200, 169, 96, 0.4); }
        50%      { transform: scale(1.05); box-shadow: 0 0 80px rgba(200, 169, 96, 0.6); }
    }
    @keyframes orbPulseFast {
        0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(200, 169, 96, 0.5); }
        50%      { transform: scale(1.08); box-shadow: 0 0 100px rgba(200, 169, 96, 0.8); }
    }
    .jackie-voice-error {
        color: rgba(220, 70, 70, 0.9);
        font-size: 0.75rem;
        text-align: center;
        max-width: 480px;
        margin: 4px auto 0;
        padding: 0 16px;
    }

    /* -- Orb section ---------------------------------------------------- */
    .jackie-orb-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px 16px 20px;
        gap: 14px;
        flex-shrink: 0;
    }
    .jackie-orb-label {
        font-size: 0.8rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--gold);
        opacity: 0.7;
    }
    .jackie-controls {
        display: flex;
        gap: 10px;
        margin-top: 4px;
    }
    .jackie-controls button {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-subtle);
        padding: 5px 14px;
        border-radius: 6px;
        font-size: 0.75rem;
        cursor: pointer;
        transition: all 0.2s;
        text-transform: uppercase;
        letter-spacing: 0.06em;
    }
    .jackie-controls button:hover {
        border-color: var(--border-gold);
        color: var(--text-muted);
    }

    /* -- Conversation area ---------------------------------------------- */
    .jackie-conversation-label {
        font-size: 0.65rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text-subtle);
        padding: 10px 24px 6px;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
    }
    .jackie-messages {
        flex: 1;
        overflow-y: auto;
        padding: 8px 24px 16px;
        display: flex;
        flex-direction: column;
        gap: 14px;
    }

    /* -- Message bubbles ------------------------------------------------ */
    .jackie-msg {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        max-width: 80%;
    }
    .jackie-msg.ai  { align-self: flex-start; }
    .jackie-msg.user { align-self: flex-end; flex-direction: row-reverse; }

    .jackie-avatar {
        width: 28px; height: 28px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 0.6rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        flex-shrink: 0;
        margin-top: 2px;
    }
    .jackie-avatar.ai-avatar {
        background: var(--gold);
        color: #1a1a1a;
    }
    .jackie-avatar.user-avatar {
        background: rgba(199,163,90,0.2);
        color: var(--gold);
        border: 1px solid rgba(199,163,90,0.3);
    }

    .jackie-bubble {
        padding: 10px 16px;
        border-radius: 14px;
        font-size: 0.9rem;
        line-height: 1.6;
        color: var(--text-primary);
    }
    .jackie-msg.ai .jackie-bubble {
        background: var(--bg-card);
        border: 1px solid var(--border-light);
        border-radius: 14px 14px 14px 4px;
    }
    .jackie-msg.user .jackie-bubble {
        background: rgba(199,163,90,0.15);
        border: 1px solid rgba(199,163,90,0.25);
        border-radius: 14px 14px 4px 14px;
    }
    .jackie-bubble .timestamp {
        font-size: 0.6rem;
        color: var(--text-subtle);
        margin-top: 4px;
    }

    /* -- Typing dots ---------------------------------------------------- */
    .jackie-typing-dots {
        display: flex; gap: 5px; align-items: center;
    }
    .jackie-typing-dots span {
        width: 7px; height: 7px;
        border-radius: 50%;
        background: var(--gold);
        animation: typingBounce 1.4s infinite both;
    }
    .jackie-typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .jackie-typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    /* -- Input bar ------------------------------------------------------ */
    .jackie-input-bar {
        padding: 14px 24px;
        border-top: 1px solid var(--border);
        background: var(--bg-card);
        flex-shrink: 0;
    }
    .jackie-input-bar form {
        display: flex;
        gap: 10px;
        align-items: center;
    }
    .jackie-input-bar input {
        flex: 1;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 11px 16px;
        color: var(--text-primary);
        font-size: 0.9rem;
        outline: none;
        transition: border-color 0.2s;
    }
    .jackie-input-bar input:focus {
        border-color: var(--border-gold);
    }
    .jackie-input-bar button[type="submit"] {
        background: var(--gold);
        border: none;
        border-radius: 10px;
        width: 42px; height: 42px;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        transition: opacity 0.2s;
        flex-shrink: 0;
    }
    .jackie-input-bar button[type="submit"]:disabled {
        opacity: 0.4;
        cursor: not-allowed;
    }
</style>

<div x-data="jackieChat()" x-init="init()" style="
    display: flex;
    flex-direction: column;
    height: calc(100vh - 140px);
    max-width: 900px;
    margin: 0 auto;
    border-radius: 12px;
    overflow: hidden;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
">
    <!-- ORB SECTION (~30%) -->
    <div class="jackie-orb-section">
        <div class="jackie-orb"
             :class="{
                'loading': loading || voiceState === 'connecting',
                'voice-listening': voiceState === 'listening' && !muted,
                'voice-speaking':  voiceState === 'speaking' && !muted,
                'voice-muted':     voiceActive && muted
             }"
             @click="orbClick()"></div>
        <span class="jackie-orb-label" x-text="orbLabel()"></span>
        <div class="jackie-controls">
            <button type="button"
                    :disabled="!voiceActive"
                    :style="!voiceActive ? 'opacity:0.4; cursor:default;' : ''"
                    @click="toggleMute()"
                    x-text="muted ? 'Unmute' : 'Mute'"></button>
            <button type="button"
                    :disabled="!voiceActive"
                    :style="!voiceActive ? 'opacity:0.4; cursor:default;' : ''"
                    @click="stopVoice()">End Session</button>
            <button type="button" @click="clearHistory()">Clear</button>
        </div>
        <div class="jackie-voice-error" x-show="voiceError" x-text="voiceError"></div>
    </div>

    <!-- CONVERSATION label -->
    <div class="jackie-conversation-label">Conversation</div>

    <!-- MESSAGES -->
    <div class="jackie-messages" x-ref="messageArea">
        <!-- Welcome state when empty -->
        <template x-if="messages.length === 0">
            <div style="
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100%;
                text-align: center;
                gap: 10px;
                opacity: 0.6;
                padding: 24px 0;
            ">
                <p style="color: var(--text-muted); font-size: 1rem; margin: 0;">Hey! I'm Jackie, your AI business assistant.</p>
                <p style="color: var(--text-subtle); font-size: 0.85rem; margin: 0;">Ask me about marketing, operations, customers, or growth strategy.</p>
            </div>
        </template>

        <!-- Message bubbles -->
        <template x-for="(msg, i) in messages" :key="i">
            <div class="jackie-msg" :class="msg.role === 'user' ? 'user' : 'ai'">
                <!-- Avatar -->
                <div class="jackie-avatar" :class="msg.role === 'user' ? 'user-avatar' : 'ai-avatar'"
                     x-text="msg.role === 'user' ? 'ME' : 'AI'"></div>
                <!-- Bubble -->
                <div class="jackie-bubble">
                    <div x-html="chatFormatMessage(msg.content)"></div>
                    <div class="timestamp" x-text="chatFormatTime(msg.timestamp)"></div>
                </div>
            </div>
        </template>

        <!-- Typing indicator -->
        <div x-show="loading" class="jackie-msg ai">
            <div class="jackie-avatar ai-avatar">AI</div>
            <div class="jackie-bubble" style="background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 14px 14px 14px 4px;">
                <div class="jackie-typing-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>
    </div>

    <!-- INPUT BAR -->
    <div class="jackie-input-bar">
        <form @submit.prevent="send()">
            <input type="text"
                   x-model="input"
                   placeholder="Ask Jackie anything about your business..."
                   autocomplete="off"
                   :disabled="loading">
            <button type="submit" :disabled="loading || !input.trim()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--bg-primary)" stroke-width="2.5">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
        </form>
    </div>
</div>

<script>
function jackieChat() {
    return {
        messages: [],
        input: '',
        loading: false,
        status: 'connected',

        // -- Voice state -------------------------------------------------
        voiceActive: false,
        voiceState: 'idle',  // 'idle' | 'connecting' | 'listening' | 'speaking'
        voiceError: '',
        muted: false,
        _pc: null,
        _localStream: null,
        _audioEl: null,
        _dataChannel: null,
        _idleTimer: null,
        _idleMs: 120000,  // auto-disconnect after 2 min of silence

        init() {
            const saved = localStorage.getItem('jackie-chat-history');
            if (saved) {
                try { this.messages = JSON.parse(saved); } catch(e) { this.messages = []; }
            }
            // Clean up the voice session if the user navigates away.
            window.addEventListener('beforeunload', () => this._cleanupVoice());
        },

        saveHistory() {
            localStorage.setItem('jackie-chat-history', JSON.stringify(this.messages.slice(-50)));
        },

        scrollBottom() {
            this.$nextTick(() => {
                const area = this.$refs.messageArea;
                if (area) area.scrollTop = area.scrollHeight;
            });
        },

        clearHistory() {
            this.messages = [];
            localStorage.removeItem('jackie-chat-history');
            this.status = 'connected';
        },

        // -- Orb click: voice is the primary action ----------------------
        orbClick() {
            if (this.loading) return;
            if (this.voiceActive) {
                this.toggleMute();
            } else {
                this.startVoice();
            }
        },

        activate() { this.orbClick(); },  // back-compat alias

        orbLabel() {
            if (this.loading) return 'thinking...';
            switch (this.voiceState) {
                case 'connecting': return 'connecting...';
                case 'listening':  return this.muted ? 'muted — tap orb to unmute' : 'listening...';
                case 'speaking':   return 'Jackie is speaking...';
                default:
                    return this.messages.length === 0
                        ? 'tap the orb to talk to Jackie'
                        : 'tap the orb to talk — or type below';
            }
        },

        // -- Voice (OpenAI Realtime over WebRTC) -------------------------
        async startVoice() {
            if (this.voiceActive || this.voiceState === 'connecting') return;
            this.voiceError = '';
            this.voiceState = 'connecting';
            try {
                // 1. Mint an ephemeral key on our server.
                const tokenResp = await fetch('/jackie/api/voice/token', { method: 'POST' });
                const tokenData = await tokenResp.json();
                if (!tokenResp.ok) {
                    throw new Error(tokenData.error || ('Token request failed: HTTP ' + tokenResp.status));
                }
                const ephemeralKey = tokenData.value
                    || (tokenData.client_secret && tokenData.client_secret.value);
                const model = tokenData.model || 'gpt-realtime';
                if (!ephemeralKey) throw new Error('No ephemeral key returned.');

                // 2. Grab the microphone.
                this._localStream = await navigator.mediaDevices.getUserMedia({ audio: true });

                // 3. Set up a peer connection. Audio in, audio out, data channel for events.
                this._pc = new RTCPeerConnection();
                this._audioEl = document.createElement('audio');
                this._audioEl.autoplay = true;
                this._audioEl.style.display = 'none';
                document.body.appendChild(this._audioEl);
                this._pc.ontrack = (e) => { this._audioEl.srcObject = e.streams[0]; };

                this._localStream.getTracks().forEach(t => this._pc.addTrack(t, this._localStream));

                this._dataChannel = this._pc.createDataChannel('oai-events');
                this._dataChannel.addEventListener('message', (e) => {
                    try { this._handleVoiceEvent(JSON.parse(e.data)); } catch (err) { /* ignore */ }
                });

                // 4. SDP offer/answer with OpenAI.
                const offer = await this._pc.createOffer();
                await this._pc.setLocalDescription(offer);

                // GA endpoint for WebRTC SDP exchange (Beta /v1/realtime?model=... is gone).
                const sdpResp = await fetch('https://api.openai.com/v1/realtime/calls?model=' + encodeURIComponent(model), {
                    method: 'POST',
                    body: offer.sdp,
                    headers: {
                        'Authorization': 'Bearer ' + ephemeralKey,
                        'Content-Type': 'application/sdp',
                    },
                });
                if (!sdpResp.ok) throw new Error('SDP exchange failed: ' + (await sdpResp.text()).slice(0, 200));
                const answerSdp = await sdpResp.text();
                await this._pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });

                this.voiceActive = true;
                this.voiceState = 'listening';
                this._startIdleTimer();
            } catch (err) {
                this.voiceError = (err && err.message) ? err.message : String(err);
                this.voiceState = 'idle';
                this.voiceActive = false;
                this._cleanupVoice();
            }
        },

        stopVoice() {
            this._cleanupVoice();
            this.voiceActive = false;
            this.voiceState = 'idle';
            this.muted = false;
        },

        toggleMute() {
            if (!this._localStream) return;
            this.muted = !this.muted;
            this._localStream.getAudioTracks().forEach(t => { t.enabled = !this.muted; });
        },

        _cleanupVoice() {
            if (this._idleTimer) { clearTimeout(this._idleTimer); this._idleTimer = null; }
            if (this._dataChannel) { try { this._dataChannel.close(); } catch(e){} this._dataChannel = null; }
            if (this._pc) { try { this._pc.close(); } catch(e){} this._pc = null; }
            if (this._localStream) {
                this._localStream.getTracks().forEach(t => { try { t.stop(); } catch(e){} });
                this._localStream = null;
            }
            if (this._audioEl) {
                this._audioEl.srcObject = null;
                try { this._audioEl.remove(); } catch(e){}
                this._audioEl = null;
            }
        },

        _startIdleTimer() {
            if (this._idleTimer) clearTimeout(this._idleTimer);
            this._idleTimer = setTimeout(() => {
                this.voiceError = 'Voice session ended after 2 min of inactivity (to save credits).';
                this.stopVoice();
            }, this._idleMs);
        },

        _handleVoiceEvent(event) {
            const t = (event && event.type) || '';
            if (t === 'input_audio_buffer.speech_started') {
                this.voiceState = 'listening';
                this._startIdleTimer();
            } else if (t === 'response.audio.delta' || t === 'response.audio_transcript.delta') {
                this.voiceState = 'speaking';
                this._startIdleTimer();
            } else if (t === 'response.done' || t === 'response.audio.done') {
                this.voiceState = 'listening';
            } else if (t === 'conversation.item.input_audio_transcription.completed') {
                const text = (event.transcript || '').trim();
                if (text) {
                    this.messages.push({ role: 'user', content: text, timestamp: new Date().toISOString() });
                    this.saveHistory();
                    this.scrollBottom();
                }
            } else if (t === 'response.audio_transcript.done') {
                const text = (event.transcript || '').trim();
                if (text) {
                    this.messages.push({ role: 'assistant', content: text, timestamp: new Date().toISOString() });
                    this.saveHistory();
                    this.scrollBottom();
                }
            } else if (t === 'error') {
                this.voiceError = (event.error && event.error.message) ? event.error.message : 'Realtime error';
            }
        },

        async send() {
            const message = this.input.trim();
            if (!message || this.loading) return;

            this.messages.push({
                role: 'user',
                content: message,
                timestamp: new Date().toISOString()
            });
            this.input = '';
            this.loading = true;
            this.saveHistory();
            this.scrollBottom();

            try {
                const history = this.messages.slice(-11, -1).map(m => ({
                    role: m.role,
                    content: m.content
                }));

                const resp = await fetch('/jackie/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, history })
                });

                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const data = await resp.json();

                this.status = data.provider || 'connected';

                this.messages.push({
                    role: 'assistant',
                    content: data.response || "I couldn't process that.",
                    timestamp: new Date().toISOString()
                });
            } catch (err) {
                this.messages.push({
                    role: 'assistant',
                    content: 'Sorry, I hit an error. Please check your API key in Settings and try again.',
                    timestamp: new Date().toISOString()
                });
            }

            this.loading = false;
            this.saveHistory();
            this.scrollBottom();
        }
    };
}
</script>
{% endblock %}
