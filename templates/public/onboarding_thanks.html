{% extends "base.html" %}

{% block title %}Thank You{% endblock %}

{% block body %}
<div style="min-height: 100vh; background-color: var(--bg-primary); display: flex; align-items: center; justify-content: center; padding: 2rem 1rem;">
    <div style="text-align: center; max-width: 500px;">

        <!-- Checkmark Icon -->
        <div style="width: 72px; height: 72px; border-radius: 50%; background: rgba(199, 163, 90, 0.15); border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        </div>

        <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-primary); margin: 0 0 0.75rem;">Thank you, {{ name }}!</h1>
        <p style="color: var(--text-secondary); font-size: 1.05rem; line-height: 1.6; margin: 0 0 2rem;">
            We've received your information and will be in touch soon.
        </p>

        <a href="/"
           style="display: inline-block; padding: 0.7rem 1.8rem; background: rgba(199, 163, 90, 0.12); border: 1px solid rgba(199, 163, 90, 0.4); color: var(--gold); text-decoration: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600; transition: background 0.2s, border-color 0.2s;"
           onmouseover="this.style.background='rgba(199,163,90,0.2)'; this.style.borderColor='rgba(199,163,90,0.7)'"
           onmouseout="this.style.background='rgba(199,163,90,0.12)'; this.style.borderColor='rgba(199,163,90,0.4)'">
            Back to Home
        </a>
    </div>
</div>
{% endblock %}
