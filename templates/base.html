<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0B0B0D">
    <title>{% block title %}{{ business_name }}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/custom.css">
    {% if config.UMAMI_WEBSITE_ID %}
    <script defer src="{{ config.UMAMI_SCRIPT_URL | default('https://cloud.umami.is/script.js', true) }}"
            data-website-id="{{ config.UMAMI_WEBSITE_ID }}"></script>
    {% endif %}
    <!-- Licensed by Simple Tech Skills | simpletechskills.com
         Resale license required for commercial redistribution. -->
    {% block head %}{% endblock %}
</head>
<body>
    {% block body %}{% endblock %}

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container" x-data="toastManager()">
        <template x-for="toast in toasts" :key="toast.id">
            <div class="toast" :class="'toast-' + toast.type" x-show="toast.visible"
                 x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-x-full"
                 x-transition:enter-end="opacity-100 translate-x-0"
                 x-transition:leave="transition ease-in duration-200"
                 x-transition:leave-start="opacity-100"
                 x-transition:leave-end="opacity-0">
                <span x-text="toast.message"></span>
            </div>
        </template>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        // Toast manager
        function toastManager() {
            return {
                toasts: [],
                show(message, type = 'success') {
                    const id = Date.now();
                    this.toasts.push({ id, message, type, visible: true });
                    setTimeout(() => {
                        this.toasts = this.toasts.filter(t => t.id !== id);
                    }, 4000);
                }
            };
        }

        // Global toast function
        window.showToast = function(message, type = 'success') {
            const event = new CustomEvent('show-toast', { detail: { message, type } });
            window.dispatchEvent(event);
        };

        // Format currency helper
        function formatCurrency(value) {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(value);
        }

        // Relative time helper
        function timeAgo(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const seconds = Math.floor((now - date) / 1000);
            if (seconds < 60) return 'just now';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return minutes + 'm ago';
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return hours + 'h ago';
            const days = Math.floor(hours / 24);
            if (days < 30) return days + 'd ago';
            return date.toLocaleDateString();
        }
    </script>
    {% block scripts %}{% endblock %}

    <!-- Flash messages from Flask -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <script>
        document.addEventListener('alpine:init', () => {
            {% for category, message in messages %}
            setTimeout(() => window.showToast("{{ message }}", "{{ category }}"), 100);
            {% endfor %}
        });
    </script>
    {% endif %}
    {% endwith %}
</body>
</html>
